<script>
var G={name:'PAWS',spec:'MYSTERY',brain:40,clues:0,books:0,inv:[],completed:[],chapter:1};
var ROOMS=[
  {id:'mystery',name:'THE MYSTERY WING',icon:'[?]',desc:'Missing books, hidden clues, and a suspect list. Who took the rarest book in the library?',skill:'INFER',
   puzzles:[
    {id:'m1',type:'choice',chapter:'Chapter 1: The Missing Book',
     setup:'The rarest book in the library -- "The First Meow" -- has vanished. You find three clues:\\n\\n  CLUE A: Muddy paw prints lead to the EAST door.\\n  CLUE B: The book was last seen at 3pm.\\n  CLUE C: Only the librarian has a key to that shelf.\\n\\nThree suspects were in the library at 3pm:\\n\\n  SUSPECT 1: Mr. Tabby -- arrived at 2pm, left at 4pm\\n  SUSPECT 2: Ms. Calico -- arrived at 4pm\\n  SUSPECT 3: The Librarian -- was at the front desk all day',
     question:'Based ONLY on the clues above, who is the MOST LIKELY suspect?',skill:'INFER',
     options:['A) Mr. Tabby -- he was there and had paw prints nearby','B) Ms. Calico -- she seems suspicious','C) The Librarian -- only one with key access','D) Not enough information to decide'],
     correct:2,item:'MAGNIFYING GLASS',
     explain:'CORRECT ANSWER: C) The Librarian.\\n\\nSKILL USED: INFERENCE\\n\\nCLUE LOGIC:\\n- Only the librarian has a key (Clue C)\\n- The book disappeared at 3pm\\n- Mr. Tabby had no key access\\n- Ms. Calico was not even there at 3pm\\n\\nIMPORTANT: We are inferring, not proving. A good critical thinker knows the difference! The librarian is most LIKELY -- but we would need more evidence to be CERTAIN.'},
    {id:'m2',type:'rank',chapter:'Chapter 2: Evaluating Evidence',
     setup:'You have found 4 pieces of evidence. Rank from STRONGEST to WEAKEST.',
     question:'Rank these from STRONGEST evidence (1) to WEAKEST (4):',skill:'EVALUATE',
     options:['A) A neighbour says they "think" they saw someone','B) A clear paw print matching the suspect\'s size','C) The suspect SAYS they were elsewhere','D) A dated receipt showing the suspect bought gloves'],
     correct_order:[1,3,0,2],
     explain:'STRONGEST TO WEAKEST:\\n\\n  1st: B) The paw print -- physical, measurable evidence\\n  2nd: D) The receipt -- concrete documentation\\n  3rd: A) The neighbour\'s account -- memory is unreliable\\n  4th: C) The suspect\'s own claim -- self-serving, unverified\\n\\nSKILL: EVALUATE\\n\\nNot all evidence is equal. Physical evidence and documentation are generally stronger than memory or self-report.',item:'EVIDENCE NOTEBOOK'},
    {id:'m3',type:'perspective',chapter:'Chapter 3: Two Sides',
     setup:'The librarian says: "I would NEVER steal. I have protected these books for 20 years. If I wanted the book I could just READ it here!"\\n\\nThe accuser says: "She is the ONLY one with a key. The evidence points directly to her."',
     question:'Which statement best shows STRONG critical thinking?',skill:'ANALYSE',
     options:['A) The librarian is definitely guilty -- she had the key','B) The librarian is definitely innocent -- she loves books','C) Both sides make some valid points; we need more evidence before deciding','D) We should ask the most popular cat in town what they think'],
     correct:2,item:'LOGIC LENS',
     explain:'CORRECT ANSWER: C)\\n\\nSKILL: ANALYSE + EVALUATE\\n\\nThe librarian\'s argument contains a LOGICAL POINT: why steal what you can access freely?\\n\\nThe accuser\'s argument is based on ONE piece of circumstantial evidence.\\n\\nStrong critical thinkers hold conclusions LOOSELY until they have enough evidence. They say "it seems likely that..." rather than "it is definitely..."'}
   ]},
  {id:'science',name:'THE SCIENCE WING',icon:'[+]',desc:'Experiments gone wrong, facts vs opinions, and the scientific method.',skill:'ANALYSE',
   puzzles:[
    {id:'s1',type:'choice',chapter:'Chapter 1: Fact or Opinion?',
     setup:'STATEMENT 1: "Water boils at 100 degrees Celsius at sea level."\\n  STATEMENT 2: "Science is the most important subject in school."\\n  STATEMENT 3: "The Earth orbits the Sun."\\n  STATEMENT 4: "Cats are better pets than dogs."',
     question:'Which TWO statements are FACTS (not opinions)?',skill:'ANALYSE',
     options:['A) Statements 1 and 4','B) Statements 1 and 3','C) Statements 2 and 4','D) All four are facts'],
     correct:1,item:'FACT DETECTOR BADGE',
     explain:'CORRECT ANSWER: B) Statements 1 and 3\\n\\nSKILL: ANALYSE\\n\\nA FACT can be verified with evidence and is true regardless of who believes it.\\n- Water boiling at 100C is measurable and repeatable.\\n- Earth orbiting the Sun is verified by observation.\\n\\nAn OPINION expresses a belief or value judgment.\\n- "Most important subject" depends on who you ask\\n- "Better pets" is subjective\\n\\nPeople often state opinions AS IF they were facts. Spotting the difference is one of the most important thinking skills you will ever develop.'},
    {id:'s2',type:'choice',chapter:'Chapter 2: The Flawed Experiment',
     setup:'A scientist claims: "Cats who listen to classical music are smarter!"\\n\\nHer experiment:\\n  - She tested 10 cats who listen to classical music\\n  - She gave them a maze puzzle\\n  - 8 out of 10 solved it\\n  - She did NOT test any cats who do NOT listen to classical music.',
     question:'What is the MAIN problem with her experiment?',skill:'EVALUATE',
     options:['A) 10 cats is not enough -- she needed 1000','B) She had no control group to compare against','C) Mazes are not a good test of intelligence','D) Classical music is boring and cats do not like it'],
     correct:1,item:'HYPOTHESIS CARD',
     explain:'CORRECT ANSWER: B) No control group\\n\\nSKILL: EVALUATE\\n\\nA CONTROL GROUP is a group that does NOT receive the experimental treatment. Without one, you cannot know if the result is caused by your variable.\\n\\nWhat if ALL cats can solve that maze? Without a comparison group, you cannot conclude anything about music\'s effect.\\n\\nGood science always asks: "Compared to what?"'},
    {id:'s3',type:'choice',chapter:'Chapter 3: Cause and Effect',
     setup:'A newspaper headline reads:\\n\\n  "CITIES WITH MORE ICE CREAM SHOPS HAVE MORE DROWNINGS"\\n\\n  The article argues that ice cream causes drowning.\\n\\n  A statistician notes that BOTH ice cream sales AND drowning rates increase in SUMMER.',
     question:'What reasoning error is the newspaper making?',skill:'INFER',
     options:['A) Correlation vs Causation -- two things occurring together does not mean one CAUSES the other','B) The newspaper is correct -- ice cream must be dangerous','C) Statistics are always wrong','D) The statistician is trying to protect the ice cream industry'],
     correct:0,item:'CAUSE-EFFECT MAP',
     explain:'CORRECT ANSWER: A)\\n\\nSKILL: INFER + ANALYSE\\n\\nCORRELATION vs CAUSATION:\\n  CORRELATION: Two things happen at the same time\\n  CAUSATION: One thing DIRECTLY CAUSES the other\\n\\nIn this case: SUMMER causes BOTH. People swim more in summer (more drownings) AND buy more ice cream in summer.\\n\\nAlways ask: "Could a THIRD factor explain both things?"'}
   ]},
  {id:'history',name:'THE HISTORY WING',icon:'[H]',desc:'Old manuscripts, conflicting accounts, and questions of perspective.',skill:'INTERPRET',
   puzzles:[
    {id:'h1',type:'choice',chapter:'Chapter 1: Whose Story?',
     setup:'BOOK A (written by the ruling family):\\n    "The great King Pawsworth bravely united all cats and built a prosperous city for all."\\n\\n  BOOK B (written by a historian 200 years later):\\n    "King Pawsworth forcibly relocated many cat families to build his city, without their consent."',
     question:'What is the MOST important thing a critical thinker should notice?',skill:'INTERPRET',
     options:['A) Book A is correct because it was written first','B) Book B is correct because it was written by a historian','C) Both accounts may be biased -- the SOURCE matters as much as the content','D) History books are always wrong so neither matters'],
     correct:2,item:'PERSPECTIVE PRISM',
     explain:'CORRECT ANSWER: C)\\n\\nSKILL: INTERPRET\\n\\nBOTH sources have potential bias:\\n  - Book A: Written by the people IN POWER. They benefit from a positive story.\\n  - Book B: A later historian -- may have more sources, but also their own perspective.\\n\\nA critical thinker asks:\\n  WHO wrote this? WHY did they write it? WHEN was it written? WHO benefited from this version?'},
    {id:'h2',type:'choice',chapter:'Chapter 2: Primary vs Secondary',
     setup:'You are researching life in 1850. You find:\\n\\n  SOURCE 1: A diary entry from a cat who lived in 1850\\n  SOURCE 2: A textbook chapter about 1850 published last year\\n  SOURCE 3: A painting of a cat street scene from 1850\\n  SOURCE 4: A documentary film made in 2010 about 1850',
     question:'Which sources are PRIMARY sources (created at the time of the event)?',skill:'ANALYSE',
     options:['A) Sources 1 and 2','B) Sources 2 and 4','C) Sources 1 and 3','D) All four are primary sources'],
     correct:2,item:'ARCHIVE KEY',
     explain:'CORRECT ANSWER: C) Sources 1 and 3\\n\\nSKILL: ANALYSE\\n\\nPRIMARY SOURCE: Created during the time being studied.\\n  - The 1850 diary: First-hand account from that time\\n  - The 1850 painting: Created at that time\\n\\nSECONDARY SOURCE: Created later, interpreting past events.\\n  - The recent textbook: Written now ABOUT the past\\n  - The 2010 documentary: Created much later\\n\\nNeither is automatically "better" -- they serve different purposes.'},
    {id:'h3',type:'perspective',chapter:'Chapter 3: Argue Both Sides',
     setup:'DEBATE: "Should the library charge an entry fee to raise money for new books?"\\n\\n  FOR: The library needs funds. New books benefit everyone. A small fee is fair.\\n\\n  AGAINST: Libraries should be free for all. A fee would stop poorer cats from accessing knowledge.',
     question:'Which response shows the BEST critical thinking?',skill:'EXPLAIN',
     options:['A) Fees are always bad -- libraries must be free, full stop','B) Fees are fine -- everyone should pay their way','C) Both sides have merit; the answer may depend on the SIZE of the fee and what alternatives exist for cats who cannot afford it','D) This is a political question so I should not have an opinion'],
     correct:2,item:'DEBATE MEDAL',
     explain:'CORRECT ANSWER: C)\\n\\nSKILL: EXPLAIN + EVALUATE\\n\\nStrong thinkers can hold NUANCE -- most real questions are not simply yes or no.\\n\\n  The FOR side makes a real point about funding.\\n  The AGAINST side makes a real point about access and equality.\\n\\nThe BEST position acknowledges both AND looks for solutions that address both concerns (e.g. a sliding-scale fee, or a waiver for those who cannot pay).\\n\\nSaying "I should not have an opinion" on important questions is also a form of critical thinking failure.'}
   ]},
  {id:'logic',name:'THE LOGIC VAULT',icon:'[=]',desc:'Locked with pure logic puzzles. Syllogisms, fallacies, and pattern recognition. The hardest wing.',skill:'EXPLAIN',
   puzzles:[
    {id:'l1',type:'choice',chapter:'Chapter 1: The Syllogism',
     setup:'A SYLLOGISM has two premises and a conclusion:\\n\\n  PREMISE 1: All mammals are warm-blooded.\\n  PREMISE 2: All cats are mammals.\\n  CONCLUSION: Therefore, all cats are warm-blooded.\\n\\nNow try:\\n\\n  PREMISE 1: All books in the RARE section require a special pass.\\n  PREMISE 2: "The First Meow" is in the RARE section.\\n  CONCLUSION: ?',
     question:'What is the VALID logical conclusion?',skill:'EXPLAIN',
     options:['A) "The First Meow" is a very old book','B) "The First Meow" requires a special pass to access','C) All rare books are interesting','D) You should read "The First Meow" first'],
     correct:1,item:'LOGIC CRYSTAL',
     explain:'CORRECT ANSWER: B)\\n\\nSKILL: LOGICAL REASONING (Deductive)\\n\\nIn a valid syllogism, if both premises are TRUE, the conclusion MUST be true.\\n\\n  P1: All RARE section books need a pass. (TRUE)\\n  P2: "The First Meow" is in the RARE section. (TRUE)\\n  THEREFORE: "The First Meow" needs a pass. (MUST BE TRUE)\\n\\nThe other options may FEEL related but do not FOLLOW LOGICALLY. This is called a NON SEQUITUR.'},
    {id:'l2',type:'choice',chapter:'Chapter 2: Spot the Fallacy',
     setup:'LOGICAL FALLACIES:\\n  AD HOMINEM: Attacking the person instead of the argument\\n  STRAW MAN: Misrepresenting someone\'s argument to make it easier to attack\\n  FALSE DILEMMA: Presenting only 2 options when more exist\\n  APPEAL TO POPULARITY: "Everyone believes X, so X must be true"\\n\\nCat A: "We should have longer lunch breaks at school."\\nCat B: "So you want students to NEVER learn anything at all?!"',
     question:'Which fallacy is Cat B using?',skill:'ANALYSE',
     options:['A) Ad Hominem -- attacking Cat A personally','B) Straw Man -- exaggerating Cat A\'s argument into an extreme version','C) False Dilemma -- pretending there are only two options','D) Appeal to Popularity -- claiming everyone agrees'],
     correct:1,item:'FALLACY FIELD GUIDE',
     explain:'CORRECT ANSWER: B) Straw Man\\n\\nSKILL: ANALYSE\\n\\nCat A said: "Longer lunch breaks." (a modest suggestion)\\nCat B responded as if Cat A said: "No learning ever." (an extreme position)\\n\\nThis is a STRAW MAN -- building a weaker, distorted version of someone\'s argument, then attacking that fake version.\\n\\nWhen you notice it, you can say: "That is not what I said. My actual point is..."'},
    {id:'l3',type:'choice',chapter:'Chapter 3: The Pattern',
     setup:'Library events:\\n\\n  Monday:    Book missing from SHELF A\\n  Tuesday:   Book missing from SHELF C\\n  Wednesday: Book missing from SHELF E\\n  Thursday:  ???\\n\\n  Shelf order: A B C D E F G H\\n  Additional clue: All missing books are about ASTRONOMY.',
     question:'What is the MOST logical prediction for Thursday?',skill:'INFER',
     options:['A) A book will go missing from Shelf F -- next in sequence','B) A book will go missing from Shelf G -- skipping every other shelf','C) No book will go missing -- the pattern is complete','D) A book about ASTRONOMY will go missing from Shelf G'],
     correct:3,item:'PATTERN DECODER',
     explain:'CORRECT ANSWER: D)\\n\\nSKILL: PATTERN RECOGNITION + INFER\\n\\nThere are TWO patterns:\\n\\n  PATTERN 1 (shelf): A, C, E = every OTHER shelf. Next = G\\n  PATTERN 2 (content): All missing books are about ASTRONOMY\\n\\nA strong answer combines BOTH patterns. Answer B catches only the shelf pattern. Answer D catches both.\\n\\nCritical thinking means considering ALL available information, not just the first pattern you notice.'}
   ]}
];

function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});document.getElementById(id).classList.add('on');window.scrollTo(0,0);}
function pickSpec(i,spec){G.spec=spec;document.querySelectorAll('[id^=spec-]').forEach(function(b){b.classList.remove('sel');b.textContent=b.textContent.replace('[x]','[  ]');});var btn=document.getElementById('spec-'+i);btn.classList.add('sel');btn.textContent=btn.textContent.replace('[  ]','[x]');}
function updStats(){document.getElementById('bar-brain').style.width=Math.min(100,G.brain)+'%';document.getElementById('val-brain').textContent=G.brain;var cp=Math.min(100,G.clues*10);document.getElementById('bar-clues').style.width=cp+'%';document.getElementById('val-clues').textContent=G.clues;var bp=Math.min(100,G.books*10);document.getElementById('bar-books').style.width=bp+'%';document.getElementById('val-books').textContent=G.books;var inv=document.getElementById('inventory-display');inv.innerHTML=G.inv.length?G.inv.map(function(i){return '<span class="inv-item">'+i+'</span>';}).join(''):'[ empty ]';}
function buildRooms(){var list=document.getElementById('room-list');list.innerHTML='';ROOMS.forEach(function(room){var done=G.completed.filter(function(c){return c.startsWith(room.id);}).length;var total=room.puzzles.length;var div=document.createElement('div');div.style.cssText='border:2.5px solid #000;padding:10px;margin-bottom:10px;cursor:pointer';div.innerHTML='<div style="font-weight:700;font-size:15px">'+room.icon+' '+room.name+'</div><div style="font-size:12px;margin:4px 0">Skill: '+room.skill+' | Progress: '+done+'/'+total+'</div><div style="font-size:12px;line-height:1.6;margin-top:4px">'+room.desc+'</div><div style="font-size:12px;margin-top:6px;font-weight:700">'+(done>=total?'[COMPLETE]':'>> ENTER')+'</div>';div.onclick=function(){enterRoom(room.id);};list.appendChild(div);});}
function enterRoom(roomId){currentRoom=ROOMS.find(function(r){return r.id===roomId;});currentPuzzleIdx=0;for(var i=0;i<currentRoom.puzzles.length;i++){if(!G.completed.includes(currentRoom.puzzles[i].id)){currentPuzzleIdx=i;break;}}showPuzzle();}
function showPuzzle(){if(currentPuzzleIdx>=currentRoom.puzzles.length){showRoomComplete();return;}currentPuzzle=currentRoom.puzzles[currentPuzzleIdx];if(G.completed.includes(currentPuzzle.id)){currentPuzzleIdx++;showPuzzle();return;}answered=false;rankOrder=[];var pc=document.getElementById('puzzle-content');var specHint=(G.spec===currentRoom.id.toUpperCase())||(G.spec==='MYSTERY'&&currentRoom.id==='mystery')||(G.spec==='SCIENCE'&&currentRoom.id==='science')||(G.spec==='HISTORY'&&currentRoom.id==='history')||(G.spec==='LOGIC'&&currentRoom.id==='logic');var hint=specHint?'<div class="clue-box">[SPECIALIST HINT] As a '+G.spec+' reader, you have an advantage here. Read each clue twice before deciding.</div>':'';if(currentPuzzle.type==='rank'){pc.innerHTML='<div class="hdr"><div class="title" style="font-size:15px">'+currentRoom.name+'</div><div class="sub">'+currentPuzzle.chapter+'</div></div><div class="chapter-badge">SKILL: '+currentPuzzle.skill+'</div>'+hint+'<pre style="font-size:13px;line-height:1.6;white-space:pre-wrap">'+currentPuzzle.setup+'</pre><div class="divider"></div><div style="font-size:14px;font-weight:700;margin-bottom:8px">'+currentPuzzle.question+'</div><div style="font-size:12px;margin-bottom:8px">Tap items in order from STRONGEST (first) to WEAKEST (last):</div><div id="rank-options"></div><div id="rank-selected" style="border:2px solid #000;padding:8px;min-height:40px;margin:8px 0;font-size:13px">Your order: <span id="rank-display">[ tap items above ]</span></div><button class="btn" id="rank-submit" onclick="submitRank()">&gt;&gt; SUBMIT ORDER</button>';var ro=document.getElementById('rank-options');currentPuzzle.options.forEach(function(opt,i){var b=document.createElement('button');b.className='btn';b.id='rank-opt-'+i;b.textContent=opt;b.onclick=function(){addToRank(i,opt,b);};ro.appendChild(b);});}else{pc.innerHTML='<div class="hdr"><div class="title" style="font-size:15px">'+currentRoom.name+'</div><div class="sub">'+currentPuzzle.chapter+'</div></div><div class="chapter-badge">SKILL: '+currentPuzzle.skill+'</div>'+hint+'<pre style="font-size:13px;line-height:1.6;white-space:pre-wrap">'+currentPuzzle.setup+'</pre><div class="divider"></div><div style="font-size:14px;font-weight:700;margin-bottom:10px">'+currentPuzzle.question+'</div>'+currentPuzzle.options.map(function(opt,i){return '<button class="btn" id="choice-'+i+'" onclick="submitChoice('+i+')">'+opt+'</button>';}).join('')+'<div id="puzzle-feedback"></div>';}show('s-puzzle');}
function addToRank(i,opt,btn){if(rankOrder.includes(i))return;rankOrder.push(i);btn.classList.add('sel');document.getElementById('rank-display').textContent=rankOrder.map(function(idx,pos){return (pos+1)+') '+currentPuzzle.options[idx].substring(0,20)+'...';}).join(' | ');}
function submitRank(){if(rankOrder.length<currentPuzzle.options.length){alert('Please rank ALL items first!');return;}var correct=JSON.stringify(rankOrder)===JSON.stringify(currentPuzzle.correct_order);showResult(correct,currentPuzzle.explain,currentPuzzle.item||null);}
function submitChoice(i){if(answered)return;answered=true;var correct=(i===currentPuzzle.correct);for(var j=0;j<currentPuzzle.options.length;j++){var b=document.getElementById('choice-'+j);if(b){b.disabled=true;if(j===currentPuzzle.correct)b.classList.add('correct');else if(j===i&&!correct)b.classList.add('wrong');}}var fb=document.getElementById('puzzle-feedback');if(fb){fb.className='feedback '+(correct?'good':'bad');fb.innerHTML=(correct?'CORRECT! Well reasoned.':'NOT QUITE. The correct answer is highlighted above.')+' See full explanation next.';}setTimeout(function(){showResult(correct,currentPuzzle.explain,correct?(currentPuzzle.item||null):null);},1200);}
function showResult(correct,explain,item){var rc=document.getElementById('result-content');var itemHtml=item?'<div class="result-box"><div style="font-size:14px;font-weight:700">ITEM FOUND!</div><div style="font-size:13px;margin-top:6px">[ '+item+' ] added to inventory</div></div>':'';rc.innerHTML='<div class="hdr"><div class="title" style="font-size:15px">'+(correct?'CORRECT!':'KEEP GOING!')+'</div></div><div class="star-row">'+(correct?'* * * * *':'* * *')+'</div>'+itemHtml+'<div style="font-size:13px;font-weight:700;margin:10px 0">FULL EXPLANATION:</div><div class="clue-box" style="white-space:pre-wrap;font-size:13px;line-height:1.8">'+explain+'</div><div class="score-box">BRAIN POWER +'+(correct?'15':'5')+' | Skill used: '+currentPuzzle.skill+'</div><div class="think-box">Can you think of a real-life situation where this skill would help you make a better decision?</div>';if(correct){G.brain=Math.min(100,G.brain+15);G.clues++;if(item&&!G.inv.includes(item)){G.inv.push(item);G.books++;}G.completed.push(currentPuzzle.id);}else{G.brain=Math.min(100,G.brain+5);}updStats();show('s-result');}
function showRoomComplete(){var rc=document.getElementById('result-content');rc.innerHTML='<div class="hdr"><div class="title">WING COMPLETE!</div></div><pre class="big-ascii">\\n  /\\_____/\\\\\\n (  ^   ^  )\\n (  =___=  )\\n  (_______)\\n  |  WIN  |</pre><div class="result-box"><div style="font-size:16px;font-weight:700">'+currentRoom.name+'</div><div style="font-size:13px;margin-top:6px">All puzzles solved!</div></div><div class="score-box">BRAIN POWER +20 BONUS | Books collected: '+G.books+'</div><div class="think-box">You have mastered the skill of '+currentRoom.skill+'. How could you use this skill outside of a library?</div>';G.brain=Math.min(100,G.brain+20);updStats();show('s-result');}
document.getElementById('btn-start').onclick=function(){show('s-name');};
document.getElementById('btn-howto').onclick=function(){show('s-howto');};
document.getElementById('btn-back-intro').onclick=function(){show('s-intro');};
document.getElementById('btn-go-name').onclick=function(){show('s-name');};
document.getElementById('btn-go-game').onclick=function(){var n=document.getElementById('name-input').value.trim();if(n)G.name=n.toUpperCase();document.getElementById('hub-name-display').textContent='Detective '+G.name+' | '+G.spec;updStats();buildRooms();show('s-hub');};
document.getElementById('btn-hub-return').onclick=function(){buildRooms();updStats();show('s-hub');};
document.getElementById('btn-result-next').onclick=function(){buildRooms();updStats();if(currentPuzzleIdx<(currentRoom?currentRoom.puzzles.length-1:0)){currentPuzzleIdx++;showPuzzle();}else{show('s-hub');}};
